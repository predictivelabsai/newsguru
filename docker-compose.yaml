services:
  newsguru:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5020:5020"
    environment:
      - DB_URL=${DB_URL}
      - XAI_API_KEY=${XAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - EXA_API_KEY=${EXA_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5020/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
